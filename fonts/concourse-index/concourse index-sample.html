<!DOCTYPE HTML>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<link rel="stylesheet" type="text/css" href="./concourse-index-sample.css" />
<link rel="stylesheet" type="text/css" href="https://github.com/erichologist/assets/raw/refs/heads/main/fonts/concourse-index/concourse-index-sample.css" />
<style>@import url('./concourse.css');
@font-face {
	font-family: concourse_index;
	font-style: normal;
	font-weight: normal;
	font-stretch: normal;
	font-display: auto;
	src: url('./concourse_index_regular.woff2') format('woff2');
}
:root {
	--sh-a-after:-.05px -.05px 1px rgba(0,0,0,.13),.05px .05px 1px rgba(0,0,0,.13),-.05px -.05px .25px #38000A66,-.05px -.05px 1px #71001466,.05px .05px 1px #1C000566;
	--link:#00E9FF;
	--link-hover:#6867AA;
	--link-hvr:var(--link-hover);
	--sans:Concourse T3 Tab, concourse-text;
	--serifcaps:Equity Caps A;
	--serif:Equity Text A;
}
body{
	background: #252A33;
	color: #F2E7D5;
	font-family:var(--sans);
	max-width:100vw;
	padding:1rem;
}
span,p,ul,ul li,a{
	font-family:var(--sans);
}
p{
	font-size:1rem;
	font-family:var(--sans);
}
ol li, ol {
	font-family:concourse_index;
}
ol li {
	font-size:1.5rem;
	font-family:concourse_index;
}
div:has(>ol){
	margin:1rem;
}
/* =======================================================
		L I N K E D °   R E D   D O T */
a:not(:has(>code)):after {
	content:'\FEFF°';
	color:#EE1730;
	font-feature-settings:"caps";
	font-family:var(--serifcaps);
	font-size:inherit;
	font-variant-numeric:normal;
	margin-left:-.02rem;
	margin-right:-.1rem !important;
	position:relative;
	text-decoration:none;
	top:-.085rem;
	text-shadow:var(--sh-a-after);
}
a:not(:has(>code))::after:hover {
	color:var(--link-hvr);
	text-decoration:underline;
}


a {
	color:var(--link);
	text-decoration:none;
	color:inherit;
	font-family:var(--serifcaps);
	font-family:var(--sans);
	font-feature-settings:"caps" !important;
	font-feature-settings:'c2sc' 1 !important;
	transition-property:background;
	transition-duration:0.2s;
}
div.nav a:active div { background:#303030; }
a:active { color:#fff; }
a:after {
	position:relative;
	content:'\FEFF°';
	margin-left:0.10rem;
	font-size:108%;
	font-weight:bold;
	/*top:-0.10rem;*/
	top:-0.20rem;
	padding-right: 0px;
	padding-left: 3px;
	/*left:-0.29rem;*/
	margin-left:-.02rem;
	margin-right:-.1rem !important;
	color:#EE1730;
	font-feature-settings:'caps' !important;
	font-variant-numeric:normal;
}
a[name]:after{ content:none; }
a.no-symbol-before:hover { background:none;}
a.no-symbol-before:after { content:none;}
.type-specimen img { display:block;
	border:1px solid #121212;
	margin-bottom:1rem;
}
.type-specimen a:after{
	content:none;
}
div > a:after, a.xref:after,
a.sample-document:after {
	content:none;
}
a.xref {
	text-transform:lowercase;
	font-feature-settings:'c2sc' 1 !important;
	font-style:normal;
	hyphens:none;
	text-shadow: 0.1px 0.1px 2px rgba(0, 0, 0, 0.40), -.3px -.2px 1.2px #77777780;
}
a:hover {
	background:#05050500;
	transition-property:background;
	transition-duration:0.2s;
	border-radius:8px;
}
</style>
</head>
<body>
<div>
	<ol>
		<li><a href="https://github.com/erichologist/assets/raw/refs/heads/main/fonts/concourse-index/concourse_index_regular.woff2">concourse_index_regular.woff2</a></li>
		<li><a href="https://github.com/erichologist/assets/raw/refs/heads/main/fonts/concourse-index/concindx.css">concindx.css</a></li>
	</ol>
</div>
</body>
</html>
